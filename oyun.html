        document.documentElement.innerHTML = '<body style="background:#0a0a14;color:#ff4444;font-family:Inter,sans-serif;display:flex;align-items:center;justify-content:center;height:100vh;margin:0;"><h1>❌ Bu içerik sadece hedef sitede çalışır.</h1></body>';
        return;
    }

    function deriveKey(pass) {
        const salt = CryptoJS.enc.Hex.parse(p.s);
        const fullKey = CryptoJS.PBKDF2(pass, salt, {
            keySize: 512/32,
            iterations: p.i,
            hasher: CryptoJS.algo.SHA512
        });
        return {
            aes: CryptoJS.enc.Hex.parse(fullKey.toString().substring(0,64)),
            full: fullKey
        };
    }

    function createLoadingScreen() {
        const faviconHTML = p.favicon ? '<link rel="icon" href="' + p.favicon + '">' : '';
        
        document.body.innerHTML = `
            <style>
                @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap');
                body{
                    margin:0;
                    background:linear-gradient(135deg, #0a0a14, #12122b);
                    color:#00ff9d;
                    font-family:'Inter',sans-serif;
                    overflow:hidden;
                    height:100vh;
                    display:flex;
                    align-items:center;
                    justify-content:center;
                }
                #loader{
                    text-align:center;
                    z-index:99999;
                    width:100%;
                    max-width:820px;
                }
                .spinner{
                    width:92px;
                    height:92px;
                    border:8px solid #00ff9d22;
                    border-top:8px solid #00ff9d;
                    border-radius:50%;
                    animation:spin 0.95s linear infinite;
                    margin:0 auto 32px;
                    box-shadow:0 0 25px rgba(0,255,157,0.6);
                }
                @keyframes spin {
                    0% { transform:rotate(0deg); }
                    100% { transform:rotate(360deg); }
                }
                .title{
                    font-size:2.6em;
                    letter-spacing:4px;
                    margin-bottom:28px;
                    text-shadow:0 0 30px rgba(0,255,157,0.5);
                }
                .status{
                    font-size:1.35em;
                    margin-top:30px;
                    letter-spacing:1.5px;
                    min-height:42px;
                }
                .progress-container{
                    width:100%;
                    max-width:520px;
                    margin:28px auto;
                    height:6px;
                    background:#1a1a2e;
                    border-radius:999px;
                    overflow:hidden;
                }
                .progress-bar{
                    height:100%;
                    width:0%;
                    background:linear-gradient(90deg,#00ff9d,#00ffcc);
                    transition:width 0.18s ease-in-out;
                    box-shadow:0 0 20px #00ff9d;
                }
                .info-bottom{
                    position:absolute;
                    bottom:45px;
                    right:55px;
                    font-size:1.1em;
                    opacity:0.75;
                }
                .version{
                    position:absolute;
                    bottom:45px;
                    left:55px;
                    font-size:1.05em;
                    opacity:0.65;
                }
            </style>
            <head>${faviconHTML}<title>${p.title} - Yükleniyor</title></head>
            <div id="loader">
                <div class="spinner" id="spinner"></div>
                <div class="title">${p.title}</div>
                <div class="progress-container"><div class="progress-bar" id="progBar"></div></div>
                <div class="status" id="progStatus">Güvenli içerik hazırlanıyor...</div>
                <div class="version">v5.0</div>
                <div class="info-bottom">Sağlayıcı: BurakGTX</div>
            </div>`;
    }

    function ultraFastDecrypt() {
        let pass = p.m === 'auto' ? p.k : prompt('🔐 Bu sayfa şifre korumalıdır.\n\nŞifreyi girin:');
        if (!pass && p.m !== 'auto') {
            alert("Şifre girilmedi.");
            return;
        }
        try {
            const keys = deriveKey(pass);
            if (CryptoJS.HmacSHA512(p.d, keys.full).toString() !== p.h) {
                throw new Error("Bütünlük hatası");
            }
            const decrypted = CryptoJS.AES.decrypt(p.d, keys.aes, {
                iv: CryptoJS.enc.Hex.parse(p.v),
                mode: CryptoJS.mode.CBC,
                padding: CryptoJS.pad.Pkcs7
            });
            const originalHTML = decrypted.toString(CryptoJS.enc.Utf8);
            if (!originalHTML) throw new Error();
            
            document.open();
            document.write(originalHTML);
            document.close();
        } catch(e) {
            alert("Yanlış şifre veya yetkisiz erişim!");
            location.reload();
        }
    }

    window.onload = function() {
        createLoadingScreen();
        const bar = document.getElementById('progBar');
        const statusText = document.getElementById('progStatus');
        let progress = 0;
        
        const interval = setInterval(() => {
            progress += Math.random() * 13 + 6.5;
            if (progress > 97) progress = 97;
            
            bar.style.width = progress + '%';
            
            if (progress > 22) statusText.textContent = "Anahtar türetiliyor...";
            if (progress > 48) statusText.textContent = "Veri çözülüyor...";
            if (progress > 71) statusText.textContent = "Güvenlik kontrolü...";
            if (progress > 87) statusText.textContent = "Son hazırlıklar...";
            
            if (progress >= 97) {
                clearInterval(interval);
                bar.style.width = '100%';
                statusText.textContent = "Tamamlandı ✓";
                
                setTimeout(() => {
                    statusText.style.color = "#00ffcc";
                    statusText.textContent = "Site açılıyor...";
                    setTimeout(ultraFastDecrypt, 680);
                }, 920);
            }
        }, 58);
    };
})();
