    function checkDomain() {
        const current = window.location.href.toLowerCase();
        let allowed = p.allowedOrigin.toLowerCase();
        if (!allowed.endsWith('/')) allowed += '/';
        return current.startsWith(allowed) || current === allowed.slice(0, -1);
    }

    if (!checkDomain()) {
        document.documentElement.innerHTML = '<body style="background:#0a0a14;color:#ff4444;font-family:Inter,sans-serif;display:flex;align-items:center;justify-content:center;height:100vh;margin:0;"><h1>❌ Bu içerik sadece hedef sitede çalışır.</h1></body>';
        return;
    }

    function deriveKey(pass) {
        const salt = CryptoJS.enc.Hex.parse(p.s);
        const fullKey = CryptoJS.PBKDF2(pass, salt, {
            keySize: 512/32,
            iterations: p.i,
            hasher: CryptoJS.algo.SHA512
        });
        return {
            aes: CryptoJS.enc.Hex.parse(fullKey.toString().substring(0,64)),
            full: fullKey
        };
    }

    function createLoadingScreen() {
        const faviconHTML = p.favicon ? '<link rel="icon" href="' + p.favicon + '">' : '';
        document.body.innerHTML = `
            <style>
                body {
                    margin: 0;
                    overflow: hidden;
                    background: #070a12;
                    font-family: 'Segoe UI', 'Arial', sans-serif;
                    width: 100vw;
                    height: 100vh;
                    user-select: none;
                }
                #loading-screen {
                    position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
                    background: url('https://burakgtx.neocities.org/image/loading.png') center center no-repeat;
                    background-size: 100% 100%;
                    z-index: 10000; display: flex;
                    flex-direction: column; justify-content: center; align-items: center;
                }
                #map-load-bottom-text {
                    position: absolute; bottom: 30px; left: 0; width: 100%; text-align: center;
                    color: #d6d6d6; font-size: 15px; font-weight: 600; letter-spacing: 0.3px;
                    padding: 0 20px;
                    text-shadow: 0 2px 6px rgba(0,0,0,0.9);
                }
                #map-load-progress-track {
                    position: absolute; bottom: 0; left: 0; width: 100%; height: 6px;
                    background: rgba(255,255,255,0.05);
                }
                #map-load-progress-fill {
                    width: 0%; height: 100%; background: #ff2d2d;
                    box-shadow: 0 0 14px rgba(255,45,45,0.75);
                    transition: width 0.1s ease-out;
                }
            </style>
            <head>${faviconHTML}<title>${p.title}</title></head>
            <div id="loading-screen">
                <div id="map-load-bottom-text">Hazırlanıyor...</div>
                <div id="map-load-progress-track">
                    <div id="map-load-progress-fill"></div>
                </div>
            </div>`;
    }

    function ultraFastDecrypt() {
        let pass = p.m === 'auto' ? p.k : prompt('🔐 Bu sayfa şifre korumalıdır.\n\nŞifreyi girin:');
        if (!pass && p.m !== 'auto') {
            alert("Şifre girilmedi.");
            location.reload();
            return;
        }
        try {
            const keys = deriveKey(pass);
            if (CryptoJS.HmacSHA512(p.d, keys.full).toString() !== p.h) {
                throw new Error("Bütünlük hatası");
            }
            const decrypted = CryptoJS.AES.decrypt(p.d, keys.aes, {
                iv: CryptoJS.enc.Hex.parse(p.v),
                mode: CryptoJS.mode.CBC,
                padding: CryptoJS.pad.Pkcs7
            });
            const originalHTML = decrypted.toString(CryptoJS.enc.Utf8);
            if (!originalHTML) throw new Error();
                        
            document.open();
            document.write(originalHTML);
            document.close();
        } catch(e) {
            alert("Yanlış şifre veya yetkisiz erişim!");
            location.reload();
        }
    }

    window.onload = function() {
        createLoadingScreen();
        const bar = document.getElementById('map-load-progress-fill');
        const statusText = document.getElementById('map-load-bottom-text');
        let progress = 0;
                
        const interval = setInterval(() => {
            progress += Math.random() * 14 + 10; 
            if (progress >= 100) {
                progress = 100;
                clearInterval(interval);
                bar.style.width = '100%';
                statusText.textContent = "Veri çözüldü, giriş yapılıyor...";
                
                // Gecikme olmadan "şak" diye tetikliyoruz
                ultraFastDecrypt();
            } else {
                bar.style.width = progress + '%';
                if (progress > 20) statusText.textContent = "Veriler çözümleniyor...";
                if (progress > 55) statusText.textContent = "Güvenlik kontrolleri yapılıyor...";
                if (progress > 80) statusText.textContent = "Bileşenler başlatılıyor... 1/2";
            }
        }, 50);
    };
})();</script></body></html>
